name: macOS Release (Manual)

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Which macOS target(s) to build"
        type: choice
        options:
          - arm64
          - intel
          - both
        default: arm64
      with_cohere:
        description: "Include optional Cohere profile in the embedded runtime"
        type: boolean
        default: false
      sign:
        description: "Sign the .app (requires signing secrets)"
        type: boolean
        default: true
      notarize:
        description: "Notarize + staple the DMG (requires notary secrets; implies sign)"
        type: boolean
        default: true
      verify:
        description: "Run offline verification of the final DMG"
        type: boolean
        default: true
      python_version:
        description: "Python version used to run the build scripts"
        type: string
        default: "3.12"
      notary_profile:
        description: "notarytool keychain profile name (created in the workflow)"
        type: string
        default: "whisper-webui-notary"
      signing_identity:
        description: "Optional override for the codesign identity (else use secret MACOS_SIGNING_IDENTITY)"
        type: string
        default: ""

jobs:
  macos:
    name: ${{ matrix.target }}
    # Runner support note:
    # - GitHub-hosted Apple Silicon: `macos-14` (arm64)
    # - GitHub-hosted Intel: historically `macos-13` (x86_64). If Intel runners become unavailable,
    #   run the `macos-intel` job on a self-hosted x86_64 macOS runner and update `matrix.runner`.
    runs-on: ${{ matrix.runner }}
    environment: macos-release
    if: >-
      github.event.inputs.targets == 'both' ||
      (github.event.inputs.targets == 'arm64' && matrix.target == 'macos-arm64') ||
      (github.event.inputs.targets == 'intel' && matrix.target == 'macos-intel')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            make_suffix: arm64
            runner: macos-14
            arch: arm64
          - target: macos-intel
            make_suffix: intel
            runner: macos-13
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.notarize }}" == "true" && "${{ inputs.sign }}" != "true" ]]; then
            echo "ERROR: notarize=true requires sign=true (notary service requires a signed app)."
            exit 1
          fi

      - name: Confirm runner architecture
        shell: bash
        run: |
          set -euo pipefail
          echo "Runner: $(uname -a)"
          arch="$(uname -m)"
          if [[ "$arch" != "${{ matrix.arch }}" ]]; then
            echo "ERROR: runner arch '$arch' does not match expected '${{ matrix.arch }}' for target '${{ matrix.target }}'."
            exit 1
          fi

      - name: Build packaged .app
        shell: bash
        run: |
          set -euo pipefail
          py="$(python -c 'import sys; print(sys.executable)')"
          args=(--python "$py" --force)
          if [[ "${{ inputs.with_cohere }}" == "true" ]]; then
            args+=(--with-cohere)
          fi
          make macos-app-${{ matrix.make_suffix }} MACOS_APP_ARGS="${args[*]}"

      - name: Import signing certificate (keychain)
        if: ${{ inputs.sign }}
        shell: bash
        env:
          MACOS_SIGNING_CERT_P12_B64: ${{ secrets.MACOS_SIGNING_CERT_P12_B64 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_SIGNING_CERT_P12_B64}" ]]; then
            echo "ERROR: missing secret MACOS_SIGNING_CERT_P12_B64"
            exit 1
          fi
          if [[ -z "${MACOS_SIGNING_CERT_PASSWORD}" ]]; then
            echo "ERROR: missing secret MACOS_SIGNING_CERT_PASSWORD"
            exit 1
          fi

          keychain_pw="$(openssl rand -base64 32)"
          keychain_path="$RUNNER_TEMP/macos-signing.keychain-db"
          cert_path="$RUNNER_TEMP/macos-signing.p12"

          security create-keychain -p "$keychain_pw" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_pw" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"

          echo "$MACOS_SIGNING_CERT_P12_B64" | base64 --decode >"$cert_path"
          security import "$cert_path" -k "$keychain_path" -P "$MACOS_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_pw" "$keychain_path"

      - name: Sign packaged .app
        if: ${{ inputs.sign }}
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ inputs.signing_identity || secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_SIGNING_IDENTITY}" ]]; then
            echo "ERROR: missing signing identity (set secret MACOS_SIGNING_IDENTITY or input signing_identity)."
            exit 1
          fi
          make macos-sign-${{ matrix.make_suffix }} MACOS_SIGN_ARGS="--hardened-runtime"

      - name: Build DMG
        shell: bash
        run: |
          set -euo pipefail
          make macos-dmg-${{ matrix.make_suffix }} MACOS_DMG_ARGS="--force"

      - name: Configure notarytool keychain profile
        if: ${{ inputs.notarize }}
        shell: bash
        env:
          PROFILE: ${{ inputs.notary_profile }}
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${PROFILE}" ]]; then
            echo "ERROR: missing input notary_profile"
            exit 1
          fi
          if [[ -z "${APPLE_ID}" || -z "${TEAM_ID}" || -z "${PASSWORD}" ]]; then
            echo "ERROR: missing notary secrets (MACOS_NOTARY_APPLE_ID / MACOS_NOTARY_TEAM_ID / MACOS_NOTARY_PASSWORD)."
            exit 1
          fi
          xcrun notarytool store-credentials "$PROFILE" --apple-id "$APPLE_ID" --team-id "$TEAM_ID" --password "$PASSWORD"

      - name: Notarize + staple DMG
        if: ${{ inputs.notarize }}
        shell: bash
        run: |
          set -euo pipefail
          make macos-notarize-${{ matrix.make_suffix }} MACOS_NOTARY_ARGS="--keychain-profile ${{ inputs.notary_profile }} --timeout 60m --force"

      - name: Verify final DMG (offline)
        if: ${{ inputs.verify }}
        shell: bash
        run: |
          set -euo pipefail
          make macos-verify-${{ matrix.make_suffix }} MACOS_VERIFY_ARGS="--force"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whisper-webui-mlx-${{ matrix.target }}
          path: |
            dist/release/*.dmg
            dist/release/notary/**
            dist/release/verify/**
          if-no-files-found: error
