    <a class="skip-link" href="#main">Skip to main content</a>
    <main id="main" tabindex="-1">
      <header class="hero">
        <div class="hero-copy">
          <h1>Whisper WebUI (MLX)</h1>
          <p>Queue files, watch the worker, and get results; cloud engines upload audio.</p>
        </div>
        <div
          class="status-card{% if worker.status == 'Running' %} is-running{% elif worker.status == 'Stopping' %} is-stopping{% elif worker.status == 'Paused' %} is-paused{% elif worker.status == 'Error' or worker.status == 'Failed' %} is-failed{% endif %}"
          id="worker-card"
          aria-live="polite"
          aria-label="Worker status"
        >
          <div class="status-head">
            <div class="status-label">Worker</div>
            <div class="status">
              <span
                class="status-indicator{% if worker.status == 'Running' %} is-running{% elif worker.status == 'Stopping' %} is-stopping{% endif %}"
                id="worker-indicator"
                aria-hidden="true"
              ></span>
              <span id="worker-status">{{ worker.status }}</span>
            </div>
          </div>
        </div>
      </header>

      <section class="tabs" aria-label="Main sections">
        <nav class="tablist" aria-label="Main sections">
          <a
            class="tab{% if active_tab == 'queue' %} is-active{% endif %}"
            data-tab="queue"
            href="/?tab=queue"
            {% if active_tab == 'queue' %}aria-current="page"{% endif %}
          >
            Queue
          </a>
          <a
            class="tab{% if active_tab == 'history' %} is-active{% endif %}"
            data-tab="history"
            href="/?tab=history"
            {% if active_tab == 'history' %}aria-current="page"{% endif %}
          >
            History
          </a>
          <a
            class="tab{% if active_tab == 'settings' %} is-active{% endif %}"
            data-tab="settings"
            href="/?tab=settings"
            {% if active_tab == 'settings' %}aria-current="page"{% endif %}
          >
            Settings
          </a>
        </nav>

        <div class="panels">
