    <div
      class="toast-stack"
      id="toast-stack"
      aria-live="polite"
      aria-atomic="false"
      aria-relevant="additions"
    ></div>
    <div class="modal" id="preview-modal" hidden>
      <div class="modal__backdrop" data-preview-close></div>
      <div
        class="modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="preview-modal-title"
        aria-describedby="preview-modal-meta"
      >
        <header class="modal__header">
          <div>
            <div class="modal__kicker">Preview</div>
            <h3 class="modal__title" id="preview-modal-title">Transcript preview</h3>
            <p class="modal__meta" id="preview-modal-meta">
              Up to 1200 characters. Use Open or Download for the full file.
            </p>
          </div>
          <button
            class="modal__close"
            type="button"
            data-preview-close
            aria-label="Close preview"
            title="Close"
          >
            ✕
          </button>
        </header>
        <div class="modal__body">
          <pre class="modal__text is-loading" id="preview-modal-text" tabindex="0">Loading…</pre>
        </div>
        <div class="modal__actions" aria-label="Preview actions">
          <button class="job-primary is-secondary" type="button" id="preview-modal-copy" disabled>
            Copy
          </button>
          <a
            class="job-primary is-secondary"
            id="preview-modal-open"
            target="_blank"
            rel="noopener"
            hidden
          >
            Open
          </a>
          <a class="job-primary" id="preview-modal-download" download hidden>
            Download
          </a>
        </div>
      </div>
    </div>
    <div class="modal" id="confirm-modal" hidden>
      <div class="modal__backdrop" data-confirm-close></div>
      <div
        class="modal__panel is-confirm"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirm-modal-title"
        aria-describedby="confirm-modal-message"
      >
        <header class="modal__header">
          <div>
            <div class="modal__kicker">Confirm</div>
            <h3 class="modal__title" id="confirm-modal-title">Confirm</h3>
            <p class="modal__meta" id="confirm-modal-meta">Can’t be undone.</p>
          </div>
          <button
            class="modal__close"
            type="button"
            data-confirm-close
            aria-label="Close confirmation"
            title="Close"
          >
            ✕
          </button>
        </header>
        <div class="modal__body">
          <p class="confirm-message" id="confirm-modal-message">Are you sure?</p>
        </div>
        <div class="modal__actions" aria-label="Confirmation actions">
          <button class="job-primary is-secondary" type="button" data-confirm-cancel>
            Cancel
          </button>
          <button class="job-primary is-danger" type="button" data-confirm-ok>
            Delete
          </button>
        </div>
      </div>
    </div>
