        function positionHistoryMenu(menu) {
          if (!(menu instanceof HTMLDetailsElement) || !menu.open) {
            resetHistoryMenuPlacement(menu);
            return;
          }

          const summary = menu.querySelector("summary");
          const panel = menu.querySelector(".job-menu-panel");
          if (!(summary instanceof HTMLElement) || !(panel instanceof HTMLElement)) {
            return;
          }

          resetHistoryMenuPlacement(menu);

          const visualViewport = window.visualViewport;
          const viewportWidth = visualViewport
            ? visualViewport.width
            : document.documentElement.clientWidth || window.innerWidth || 0;
          const viewportHeight = visualViewport
            ? visualViewport.height
            : window.innerHeight || document.documentElement.clientHeight || 0;
          const viewportLeft = visualViewport ? visualViewport.offsetLeft : 0;
          const viewportTop = visualViewport ? visualViewport.offsetTop : 0;
          const viewportRight = viewportLeft + viewportWidth;
          const viewportBottom = viewportTop + viewportHeight;
          const gutter = viewportWidth <= 520 ? 12 : 16;
          const summaryRect = summary.getBoundingClientRect();
          const spaceBelow = Math.max(0, viewportBottom - summaryRect.bottom - gutter);
          const spaceAbove = Math.max(0, summaryRect.top - viewportTop - gutter);

          let panelRect = panel.getBoundingClientRect();
          if (panelRect.height > spaceBelow && spaceAbove > spaceBelow) {
            menu.classList.add("is-drop-up");
            panelRect = panel.getBoundingClientRect();
          }

          const availableHeight = Math.max(
            0,
            menu.classList.contains("is-drop-up") ? spaceAbove : spaceBelow
          );
          panel.style.setProperty("--menu-max-height", `${Math.floor(availableHeight)}px`);
          panelRect = panel.getBoundingClientRect();

          const spaceLeft = Math.max(0, summaryRect.right - viewportLeft - gutter);
          const spaceRight = Math.max(0, viewportRight - summaryRect.left - gutter);
          if (panelRect.left < viewportLeft + gutter && spaceRight > spaceLeft) {
            menu.classList.add("is-align-left");
            panelRect = panel.getBoundingClientRect();
          }

          let shiftX = 0;
          if (panelRect.right > viewportRight - gutter) {
            shiftX -= panelRect.right - (viewportRight - gutter);
          }
          if (panelRect.left + shiftX < viewportLeft + gutter) {
            shiftX += viewportLeft + gutter - (panelRect.left + shiftX);
          }
          if (Math.abs(shiftX) > 0.5) {
            panel.style.setProperty("--menu-shift-x", `${Math.round(shiftX)}px`);
          }
        }

        function renderQueue(listEl, placeholderEl, jobs) {

          if (placeholderEl) {
            placeholderEl.style.display = "none";

          const hasRunning = jobs.some((job) => job.status === "running");
          let queuedIndex = 0;
          const rendered = [];
          for (const job of jobs) {
            const isRunning = job.status === "running";
            let queuePosition = 0;
            if (job.status === "queued") {
              queuedIndex += 1;
              queuePosition = queuedIndex + (hasRunning ? 1 : 0);
            }
            rendered.push(
              buildQueueRow(job, {
                queuePosition,
                isRunning,
              })
            );

          listEl.innerHTML = rendered.join("");
          hydrateTimestamps(listEl);
          hydrateElapsed(listEl);
        }

        function normalizeSettingsText(value) {
          return String(value || "").trim();

        function captureSettingsState(form) {
          const state = {};
          if (!form) {
            return state;
          }
          Array.from(form.elements).forEach((element) => {
            if (
              !(element instanceof HTMLInputElement) &&
              !(element instanceof HTMLSelectElement) &&
              !(element instanceof HTMLTextAreaElement)
            ) {
              return;
            }
            if (!element.name || element.disabled) {
              return;
            }
            if (element instanceof HTMLInputElement) {
              const type = element.type;
              if (type === "hidden" || type === "submit" || type === "button") {
                return;
              }
              if (type === "checkbox") {
                state[element.name] = element.checked;
                return;
              }
              if (type === "radio") {
                if (element.checked) {
                  state[element.name] = normalizeSettingsText(element.value);
                }
                return;
              }
              state[element.name] = normalizeSettingsText(element.value);
              return;
            }
            if (element instanceof HTMLSelectElement) {
              state[element.name] = element.value;
              return;
            }
            state[element.name] = normalizeSettingsText(element.value);
          });
          return state;
        }

        function isSettingsDirty(current, baseline) {
          const keys = new Set([...Object.keys(current || {}), ...Object.keys(baseline || {})]);

              return true;
            }
          }
          return false;

        function updateSettingsSourcePills(snapshot) {
          if (!snapshot || !snapshot.sources) {

          document.querySelectorAll("[data-settings-source-pill]").forEach((pill) => {
            const key = pill.getAttribute("data-settings-source-pill") || "";
            if (!key) {
              return;

            const source = sources[key];
            if (!source) {
              return;

            const normalized = allowed.has(source) ? source : "missing";
            pill.textContent = normalized;
            pill.setAttribute("title", `Value source: ${normalized}`);
            pill.classList.remove("is-env", "is-file", "is-default", "is-missing");
            pill.classList.add(`is-${normalized}`);

            return;
          }
          element.textContent = message;
          element.hidden = !message;
        }

        function setSettingsSaveState(kind, message) {
          if (!settingsSaveState) {
            return;
          }
          settingsSaveState.classList.remove("is-dirty", "is-success", "is-error");
          if (kind) {
            settingsSaveState.classList.add(kind);
          }
          settingsSaveState.textContent = message || "";
        }

        if (settingsForm && settingsSaveButton && settingsSaveState) {
          let baselineState = captureSettingsState(settingsForm);
          let savingSettings = false;
          let hasSavedOnce = settingsBannerSuccess ? !settingsBannerSuccess.hidden : false;
          const saveLabel = settingsSaveButton.textContent;
          const cohereKeyInput = settingsForm.querySelector("#cohere-api-key");
          const cohereModelInput = settingsForm.querySelector("#cohere-model");
          const clearCohereKey = settingsForm.querySelector("input[name='clear_cohere_api_key']");
          const whisperModelInput = settingsForm.querySelector("#whisper-model");
          const telegramTokenInput = settingsForm.querySelector("#telegram-token");
          const telegramChatInput = settingsForm.querySelector("#telegram-chat-id");
          const clearTelegramToken = settingsForm.querySelector("input[name='clear_telegram_token']");
          const clearTelegramChat = settingsForm.querySelector("input[name='clear_telegram_chat_id']");

          function clearSettingsErrors() {
            if (settingsBannerError) {
              settingsBannerError.hidden = true;
              settingsBannerError.textContent = "";
            }
            if (whisperModelInput) {
              whisperModelInput.classList.remove("is-invalid");
            }
            if (whisperModelError) {
              whisperModelError.hidden = true;
              whisperModelError.textContent = "";
            }
          }

          function validateSettingsForUi(current) {
            if (!whisperModelInput || whisperModelInput.disabled) {
              return { valid: true };
            }
            const value = current.whisper_model || "";
            const baseline = baselineState.whisper_model || "";
            if (!value && baseline) {
              whisperModelInput.classList.add("is-invalid");
              if (whisperModelError) {
                whisperModelError.textContent = "Whisper model can’t be blank.";
                whisperModelError.hidden = false;
              }
              return { valid: false };
            }
            whisperModelInput.classList.remove("is-invalid");
            if (whisperModelError) {
              whisperModelError.hidden = true;
              whisperModelError.textContent = "";
            }
            return { valid: true };
          }

          function updateSettingsSaveUi() {
            const current = captureSettingsState(settingsForm);
            const dirty = isSettingsDirty(current, baselineState);
            const validation = validateSettingsForUi(current);
            const canSave = dirty && validation.valid && !savingSettings;

            settingsSaveButton.disabled = !canSave;
            if (!savingSettings) {
              settingsSaveButton.textContent = saveLabel;
            }

            if (dirty && settingsBannerSuccess) {
              settingsBannerSuccess.hidden = true;
            }
            if (dirty && settingsBannerError) {
              settingsBannerError.hidden = true;
              settingsBannerError.textContent = "";
            }

            if (savingSettings) {
              setSettingsSaveState("", "Saving…");
              return;
            }
            if (!dirty) {
              setSettingsSaveState(hasSavedOnce ? "is-success" : "", hasSavedOnce ? "Saved" : "No changes");
              return;
            }
            if (!validation.valid) {
              setSettingsSaveState("is-error", "Fix highlighted fields");
              return;
            }
            setSettingsSaveState("is-dirty", "Unsaved changes");
          }

          function buildSettingsUpdatePayload(current) {
            const updates = {};

            if ("engine" in current && current.engine !== baselineState.engine) {
              updates.engine = current.engine;
            }
            if ("wtm_quick" in current && current.wtm_quick !== baselineState.wtm_quick) {
              updates.wtm_quick = current.wtm_quick;
            }
            if (
              "default_language" in current &&
              current.default_language !== baselineState.default_language
            ) {
              updates.default_language = current.default_language;
            }
            if ("cohere_model" in current && current.cohere_model !== baselineState.cohere_model) {
              updates.cohere_model = current.cohere_model;
            }
            if (
              "update_check_enabled" in current &&
              current.update_check_enabled !== baselineState.update_check_enabled
            ) {
              updates.update_check_enabled = current.update_check_enabled;
            }
            if ("log_level" in current && current.log_level !== baselineState.log_level) {
              updates.log_level = current.log_level;
            }
            if ("whisper_model" in current && current.whisper_model !== baselineState.whisper_model) {
              updates.whisper_model = current.whisper_model;
            }

            if (current.clear_cohere_api_key) {
              updates.cohere_api_key = "";
            } else if (current.cohere_api_key && current.cohere_api_key !== baselineState.cohere_api_key) {
              updates.cohere_api_key = current.cohere_api_key;
            }

            if (current.clear_telegram_token) {
              updates.telegram_token = "";
            } else if (current.telegram_token && current.telegram_token !== baselineState.telegram_token) {
              updates.telegram_token = current.telegram_token;
            }

            if (current.clear_telegram_chat_id) {
              updates.telegram_chat_id = "";
            } else if (
              current.telegram_chat_id &&
              current.telegram_chat_id !== baselineState.telegram_chat_id
            ) {
              updates.telegram_chat_id = current.telegram_chat_id;
            }

            return updates;
          }

          settingsForm.addEventListener("input", () => {
            if (savingSettings) {
              return;
            }
            if (settingsBannerError) {
              settingsBannerError.hidden = true;
              settingsBannerError.textContent = "";
            }
            updateSettingsSaveUi();
          });
          settingsForm.addEventListener("change", () => {
            if (savingSettings) {
              return;
            }
            if (settingsBannerError) {
              settingsBannerError.hidden = true;
              settingsBannerError.textContent = "";
            }
            updateSettingsSaveUi();
          });

          settingsForm.addEventListener("submit", async (event) => {
            if (event.defaultPrevented) {
              return;
            }
            if (!window.fetch) {
              return;
            }
            event.preventDefault();
            if (savingSettings) {
              return;
            }

            clearSettingsErrors();
            const current = captureSettingsState(settingsForm);
            const dirty = isSettingsDirty(current, baselineState);
            const validation = validateSettingsForUi(current);
            if (!dirty) {
              updateSettingsSaveUi();
              return;
            }
            if (!validation.valid) {
              updateSettingsSaveUi();
              if (whisperModelInput) {
                whisperModelInput.focus();
              }
              return;
            }

            const updates = buildSettingsUpdatePayload(current);
            if (Object.keys(updates).length === 0) {
              updateSettingsSaveUi();
              return;
            }

            savingSettings = true;
            settingsSaveButton.disabled = true;
            settingsSaveButton.textContent = "Saving…";
            setSettingsBanner(settingsBannerError, "");
            setSettingsBanner(settingsBannerSuccess, "");
            setSettingsSaveState("", "Saving…");

            try {
              const response = await fetch("/api/settings", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(updates),
              });

              let payload = null;
              try {
                payload = await response.json();
              } catch (error) {
                payload = null;
              }

              if (!response.ok) {
                let message = "Unable to save settings. Please try again.";
                if (payload && payload.detail) {
                  if (Array.isArray(payload.detail)) {
                    message = payload.detail.join(" ");
                  } else if (typeof payload.detail === "string") {
                    message = payload.detail;
                  }
                }
                setSettingsBanner(settingsBannerError, message);
                hasSavedOnce = false;
                setSettingsSaveState("is-error", "Save failed");
                return;
              }

              hasSavedOnce = true;
              updateSettingsSourcePills(payload);
              if (payload && payload.cohere_snapshot) {
                updateCohereSnapshot(payload.cohere_snapshot);
              }
              if (payload && payload.telegram_snapshot) {
                updateTelegramSnapshot(payload.telegram_snapshot);
              }

              if (cohereKeyInput) {
                cohereKeyInput.value = "";
              }
              if (clearCohereKey instanceof HTMLInputElement) {
                clearCohereKey.checked = false;
              }
              if (cohereModelInput && payload && payload.settings) {
                cohereModelInput.value = payload.settings.cohere_model || "";
              }
              if (telegramTokenInput) {
                telegramTokenInput.value = "";
              }
              if (telegramChatInput) {
                telegramChatInput.value = "";
              }
              if (clearTelegramToken instanceof HTMLInputElement) {
                clearTelegramToken.checked = false;
              }
              if (clearTelegramChat instanceof HTMLInputElement) {
                clearTelegramChat.checked = false;
              }

              baselineState = captureSettingsState(settingsForm);
              setSettingsBanner(settingsBannerSuccess, "Settings saved.");
              setSettingsSaveState("is-success", "Saved");
              notifySystem("Settings", "Saved.", "success", {
                key: "settings:saved",
                cooldown: 1200,
                duration: 4200,
              });
            } catch (error) {
              console.warn("Failed to save settings", error);
              setSettingsBanner(
                settingsBannerError,
                "Unable to save settings. Please try again (your changes are still here)."
              );
              setSettingsSaveState("is-error", "Save failed");
            } finally {
              savingSettings = false;
              settingsSaveButton.textContent = saveLabel;
              updateSettingsSaveUi();
            }
          });

          updateSettingsSaveUi();
        }

        document.querySelectorAll("[data-storage-action]").forEach((button) => {
          button.addEventListener("click", async () => {
            if (!(button instanceof HTMLElement) || button.hasAttribute("disabled")) {
              return;
            }
            const action = button.getAttribute("data-storage-action") || "";
            if (!action) {
              return;
            }

            if (action === "clear-history") {
              const count = historyList ? historyList.querySelectorAll(".history-row").length : 0;
              if (!count) {
                notifySystem("History", "Already empty.", "success", {
                  key: "history:empty",
                  cooldown: 2500,
                  duration: 4200,
                });
                return;
              }
              const confirmed = await openConfirmModal({
                title: "Delete completed history",
                message: buildHistoryClearMessage(count),
                confirmText: "Delete all",
                cancelText: "Cancel",
              });
              if (!confirmed) {
                return;
              }
              button.setAttribute("disabled", "disabled");
              try {
                const payload = await clearHistoryJobs();
                if (payload && payload.failed_results) {
                  const failedCount = payload.failed_results;
                  const deletedCount = payload.deleted_jobs || 0;
                  const label = deletedCount === 1 ? "item" : "items";
                  notifySystem(
                    "History",
                    `Deleted ${deletedCount} ${label}. ${failedCount} result folders couldn’t be removed.`,
                    "error",
                    {
                      key: "history:clear:partial",
                      cooldown: 2000,
                    }
                  );
                } else {
                  const deletedCount = payload && payload.deleted_jobs ? payload.deleted_jobs : count;
                  const label = deletedCount === 1 ? "item" : "items";
                  notifySystem("History", `Deleted ${deletedCount} ${label}.`, "success", {
                    key: "history:clear",
                    cooldown: 0,
                    duration: 5200,
                  });
                }
              } catch (error) {
                console.warn("Failed to clear history (settings)", error);
                notifySystem("History", "Couldn’t delete history. Try again.", "error", {
                  key: "history:clear:error",
                  cooldown: 1500,
                });
              } finally {
                await refreshState();
                button.removeAttribute("disabled");
              }
              return;
            }

            if (action === "clear-uploads") {
              const confirmed = await openConfirmModal({
                title: "Clear queued uploads",
                message:
                  "This deletes the local copies stored for processing.\nYour original files are not affected.",
                confirmText: "Clear uploads",
                cancelText: "Cancel",
              });
              if (!confirmed) {
                return;
              }
              button.setAttribute("disabled", "disabled");
              try {
                await clearUploadsStorage();
                notifySystem("Storage", "Cleared queued uploads.", "success", {
                  key: "storage:clear-uploads",
                  cooldown: 0,
                  duration: 5200,
                });
              } catch (error) {
                console.warn("Failed to clear uploads", error);
                notifySystem("Storage", "Couldn’t clear queued uploads. Try again.", "error", {
                  key: "storage:clear-uploads:error",
                  cooldown: 1500,
                });
              } finally {
                await refreshState();
                button.removeAttribute("disabled");
              }
              return;
            }

            if (action === "clear-results") {
              const confirmed = await openConfirmModal({
                title: "Clear results folder",
                message:
                  "This deletes stored transcript files from disk.\nHistory entries will remain, but downloads may stop working.",
                confirmText: "Clear results",
                cancelText: "Cancel",
              });
              if (!confirmed) {
                return;
              }
              button.setAttribute("disabled", "disabled");
              try {
                await clearResultsStorage();
                notifySystem("Storage", "Cleared results folder.", "success", {
                  key: "storage:clear-results",
                  cooldown: 0,
                  duration: 5200,
                });
              } catch (error) {
                console.warn("Failed to clear results", error);
                notifySystem("Storage", "Couldn’t clear results folder. Try again.", "error", {
                  key: "storage:clear-results:error",
                  cooldown: 1500,
                });
              } finally {
                await refreshState();
                button.removeAttribute("disabled");
              }
            }
          });
        });

        if (queueList) {
          queueList.addEventListener("click", async (event) => {
            const target = event.target;
            if (!(target instanceof Element)) {
              return;
            }
            const button = target.closest(".job-bin");
            if (!button) {
              return;
            }
            const jobId = button.getAttribute("data-job-id");
            if (!jobId) {
              return;
            }
            const row = button.closest(".job-row");
            const filenameEl = row ? row.querySelector(".job-name") : null;
            const filename = filenameEl ? filenameEl.textContent.trim() : "";
            const confirmed = await openConfirmModal({
              title: "Remove from queue",
              message: filename
                ? `Remove “${filename}” from the queue?\nThis deletes the local copy stored for processing.`
                : "Remove this item from the queue?\nThis deletes the local copy stored for processing.",
              confirmText: "Remove",
              cancelText: "Cancel",
            });
            if (!confirmed) {
              return;
            }
            button.setAttribute("disabled", "disabled");
            try {
              await deleteQueuedJob(jobId);
              notifySystem(
                "Queue",
                filename ? `Removed “${filename}”.` : "Removed from queue.",
                "success",
                {
                  key: "queue:remove",
                  cooldown: 0,
                  duration: 5200,
                }
              );
            } catch (error) {
              console.warn("Failed to remove queued job", error);
              notifySystem(
                "Queue",
                filename ? `Couldn’t remove “${filename}”. Try again.` : "Couldn’t remove from queue. Try again.",
                "error",
                {
                  key: "queue:remove:error",
                  cooldown: 1500,
                }
              );
            } finally {
              await refreshState();
            }
          });
        }

        if (historyClearButton) {
          historyClearButton.addEventListener("click", async () => {
            if (historyClearButton.disabled) {
              return;
            }
            const count = historyList ? historyList.querySelectorAll(".history-row").length : 0;
            if (!count) {
              updateHistoryClearState(0);
              return;
            }
            const confirmed = await openConfirmModal({
              title: "Delete completed history",
              message: buildHistoryClearMessage(count),
              confirmText: "Delete all",
              cancelText: "Cancel",
            });
            if (!confirmed) {
              return;
            }
            historyClearButton.setAttribute("disabled", "disabled");
            try {
              const payload = await clearHistoryJobs();
              if (payload && payload.failed_results) {
                const failedCount = payload.failed_results;
                const deletedCount = payload.deleted_jobs || 0;
                const label = deletedCount === 1 ? "item" : "items";
                notifySystem(
                  "History",
                  `Deleted ${deletedCount} ${label}. ${failedCount} result folders couldn’t be removed.`,
                  "error",
                  {
                    key: "history:clear:partial",
                    cooldown: 2000,
                  }
                );
              } else {
                const deletedCount = payload && payload.deleted_jobs ? payload.deleted_jobs : count;
                const label = deletedCount === 1 ? "item" : "items";
                notifySystem("History", `Deleted ${deletedCount} ${label}.`, "success", {
                  key: "history:clear",
                  cooldown: 0,
                  duration: 5200,
                });
              }
            } catch (error) {
              console.warn("Failed to clear history", error);
              notifySystem("History", "Couldn’t delete history. Try again.", "error", {
                key: "history:clear:error",
                cooldown: 1500,
              });
            } finally {
              await refreshState();
            }
          });
        }

        if (historyList) {
          historyList.addEventListener("click", async (event) => {
            const target = event.target;
            if (!(target instanceof Element)) {
              return;
            }
            const actionEl = target.closest("[data-action]");
            if (!actionEl) {
              return;
            }
            const action = actionEl.getAttribute("data-action");
            const row = actionEl.closest(".history-row");
            if (!row || !action) {
              return;
            }
            if (action === "view-log") {
              const details = row.querySelector(".job-details");
              if (details && !details.open) {
                details.open = true;
              }
              const log = row.querySelector("[data-log]");
              if (log) {
                log.scrollIntoView({
                  behavior: prefersReducedMotion() ? "auto" : "smooth",
                  block: "nearest"
                });
              }
            }
            if (action === "copy-filename") {
              const filename = actionEl.getAttribute("data-filename") || "";
              if (!filename) {
                return;
              }
              const success = await copyToClipboard(filename);
              if (success) {
                notifySystem("Clipboard", "Filename copied.", "success", {
                  key: "clipboard:filename",
                  cooldown: 1200,
                  duration: 4200,
                });
              } else {
                notifySystem("Clipboard", "Couldn’t copy filename. Try again.", "error", {
                  key: "clipboard:filename:error",
                  cooldown: 1500,
                });
              }
            }
            if (action === "copy-preview") {
              const jobId = actionEl.getAttribute("data-job-id") || row.getAttribute("data-job-id");
              if (!jobId) {
                return;
              }
              await copyPreviewForJob(jobId, row);
            }
            if (action === "preview") {
              await openPreviewForHistoryRow(row, actionEl);
            }
              if (action === "delete-history") {
                const jobId = row.getAttribute("data-job-id");
                if (!jobId) {
                  return;
                }
              const summary = getHistoryRowSummary(row);
              const confirmed = await openConfirmModal({
                title: "Delete history item",
                message: buildHistoryDeleteMessage(summary),
                confirmText: "Delete",
                cancelText: "Cancel",
              });
              if (!confirmed) {
                return;
              }
              actionEl.setAttribute("disabled", "disabled");
              try {
                await deleteHistoryJob(jobId);
                notifySystem("History", `Deleted “${summary.filename}”.`, "success", {
                  key: "history:delete",
                  cooldown: 0,
                  duration: 5200,
                });
              } catch (error) {
                console.warn("Failed to delete history item", error);
                notifySystem(
                  "History",
                  summary.filename
                    ? `Couldn’t delete “${summary.filename}”. Try again.`
                    : "Couldn’t delete history item. Try again.",
                  "error",
                  {
                    key: "history:delete:error",
                    cooldown: 1500,
                  }
                );
              } finally {
                await refreshState();
              }
            }
            const menu = actionEl.closest(".job-menu");
            if (menu) {
              menu.removeAttribute("open");
            }
          });
        }

        function closeHistoryMenus(exceptMenu) {
          if (!historyList) {
            return;
          }
          historyList.querySelectorAll(".job-menu[open]").forEach((menu) => {
            if (exceptMenu && menu === exceptMenu) {
              return;
            }
            menu.removeAttribute("open");
          });
        }

        document.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof Element)) {
            return;
          }
          const menu = target.closest(".job-menu");
          if (menu) {
            closeHistoryMenus(menu);
            return;
          }
          closeHistoryMenus(null);
        });

        window.addEventListener("resize", scheduleHistoryMenuPlacement, { passive: true });
        window.addEventListener("scroll", scheduleHistoryMenuPlacement, { passive: true });

        hydrateTimestamps(document);
        hydrateElapsed(document);
        hydrateTimeMeta(document);
        wireHistoryDetails(historyList);
        wireHistoryMenus(historyList);

        updateWorkerElapsed();
        if (queueList) {
          hydrateElapsed(queueList);
        }
        setInterval(() => {
          updateWorkerElapsed();
          if (queueList) {
            hydrateElapsed(queueList);
          }
        }, 1000);

        setInterval(refreshState, 2500);
        refreshState();
      })();
    </script>
