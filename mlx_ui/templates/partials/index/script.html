    <script>
      (function () {
        document.documentElement.classList.add("js");
        const tabs = Array.from(document.querySelectorAll("[data-tab]"));
        const panels = document.querySelectorAll("[data-panel]");
        if (!tabs.length) {
          return;
        }
        const tabNames = new Set(tabs.map((tab) => tab.dataset.tab));
        const TAB_STORAGE_KEY = "mlx-ui:last-tab";

        function updateUrl(tabName, replace) {
          const url = new URL(window.location.href);
          url.searchParams.set("tab", tabName);
          if (!replace && url.toString() === window.location.href) {
            return;
          }
          const state = { tab: tabName };
          if (replace) {
            history.replaceState(state, "", url);
          } else {
            history.pushState(state, "", url);
          }
        }

        function activate(tabName, options = {}) {
          const { updateHistory = false, replaceHistory = false } = options;
          if (!tabNames.has(tabName)) {
            return;
          }
          tabs.forEach((tab) => {
            const isActive = tab.dataset.tab === tabName;
            tab.classList.toggle("is-active", isActive);
            if (isActive) {
              tab.setAttribute("aria-current", "page");
            } else {
              tab.removeAttribute("aria-current");
            }
          });

          panels.forEach((panel) => {
            const isActive = panel.dataset.panel === tabName;
            panel.classList.toggle("is-active", isActive);
            panel.hidden = !isActive;
          });

          try {
            localStorage.setItem(TAB_STORAGE_KEY, tabName);
          } catch (error) {
            // localStorage may be disabled; UI should still work.
          }

          if (updateHistory) {
            updateUrl(tabName, replaceHistory);
          }
        }

        function tabFromUrl() {
          const initialTab = new URLSearchParams(window.location.search).get("tab");
          return tabNames.has(initialTab) ? initialTab : null;
        }

        let storedTab = null;
        try {
          const candidate = localStorage.getItem(TAB_STORAGE_KEY);
          storedTab = tabNames.has(candidate) ? candidate : null;
        } catch (error) {
          storedTab = null;
        }

        const initialFromUrl = tabFromUrl();
        const initialTab = initialFromUrl || storedTab || "queue";
        activate(initialTab, {
          updateHistory: !initialFromUrl,
          replaceHistory: true
        });

        tabs.forEach((tab) => {
          tab.addEventListener("click", (event) => {
            if (
              event.defaultPrevented ||
              event.button !== 0 ||
              event.metaKey ||
              event.ctrlKey ||
              event.shiftKey ||
              event.altKey
            ) {
              return;
            }
            event.preventDefault();
            activate(tab.dataset.tab, { updateHistory: true });
          });
        });

        window.addEventListener("popstate", () => {
          const tabName = tabFromUrl() || "queue";
          activate(tabName);
        });

        const queueList = document.getElementById("queue-list");
        const queuePlaceholder = document.getElementById("queue-placeholder");
        const historyList = document.getElementById("history-list");
        const historyPlaceholder = document.getElementById("history-placeholder");
        const historyClearButton = document.querySelector("[data-history-clear]");
        const historySearch = document.getElementById("history-search");
        const historyStatus = document.getElementById("history-status");
        const historySort = document.getElementById("history-sort");
        const historyViewSummary = document.getElementById("history-view-summary");
        const historyFilterEmpty = document.getElementById("history-filter-empty");
        const historyClearFilters = document.getElementById("history-clear-filters");
        const settingsForm = document.querySelector(".settings-form");
        const settingsSaveButton = settingsForm ? settingsForm.querySelector("[data-settings-save]") : null;
        const settingsSaveState = settingsForm
          ? settingsForm.querySelector("[data-settings-save-state]")
          : null;
        const settingsBannerSuccess = document.getElementById("settings-banner-success");
        const settingsBannerError = document.getElementById("settings-banner-error");
        const whisperModelError = document.getElementById("settings-error-whisper-model");
        const cohereStatusLabel = document.querySelector("[data-cohere-status]");
        const cohereSourcePill = document.querySelector("[data-cohere-source-pill]");
        const cohereKeyMask = document.querySelector("[data-cohere-key-mask]");
        const cohereKeyMaskValue = document.querySelector("[data-cohere-key-mask-value]");
        const telegramStatusLabel = document.querySelector("[data-telegram-status]");
        const telegramSourcePill = document.querySelector("[data-telegram-source-pill]");
        const telegramTokenMask = document.querySelector("[data-telegram-token-mask]");
        const telegramChatMask = document.querySelector("[data-telegram-chat-mask]");
        const telegramTokenMaskValue = document.querySelector("[data-telegram-token-mask-value]");
        const telegramChatMaskValue = document.querySelector("[data-telegram-chat-mask-value]");
        const telegramTokenHint = document.querySelector("[data-telegram-token-hint]");
        const telegramChatHint = document.querySelector("[data-telegram-chat-hint]");
        const workerStatus = document.getElementById("worker-status");
        const workerCurrent = document.getElementById("worker-current");
        const workerFilename = document.getElementById("worker-filename");
        const workerQueued = document.getElementById("worker-queued");
        const workerElapsed = document.getElementById("worker-elapsed");
        const workerEngine = document.getElementById("worker-engine");
        const workerLanguage = document.getElementById("worker-language");
        const queueCountEls = document.querySelectorAll("[data-queue-count]");
        const toastStack = document.getElementById("toast-stack");
        const previewModal = document.getElementById("preview-modal");
        const previewModalTitle = document.getElementById("preview-modal-title");
        const previewModalMeta = document.getElementById("preview-modal-meta");
        const previewModalText = document.getElementById("preview-modal-text");
        const previewModalCopy = document.getElementById("preview-modal-copy");
        const previewModalOpenLink = document.getElementById("preview-modal-open");
        const previewModalDownloadLink = document.getElementById("preview-modal-download");
        const confirmModal = document.getElementById("confirm-modal");
        const confirmModalTitle = document.getElementById("confirm-modal-title");
        const confirmModalMessage = document.getElementById("confirm-modal-message");
        const confirmModalOk = confirmModal ? confirmModal.querySelector("[data-confirm-ok]") : null;
        const confirmModalCancel = confirmModal
          ? confirmModal.querySelector("[data-confirm-cancel]")
          : null;
        const uploadForm = document.querySelector(".upload-card");
        const fileInput = document.getElementById("file-input");
        const folderInput = document.getElementById("folder-input");
        const dropzone = document.getElementById("dropzone");
        const fileList = document.getElementById("file-list");
        const selectionValid = document.getElementById("selection-valid");
        const selectionSize = document.getElementById("selection-size");
        const selectionBatch = document.getElementById("selection-batch");
        const selectionSkipped = document.getElementById("selection-skipped");
        const selectionState = document.getElementById("selection-state");
        const fileListToggle = document.getElementById("file-list-toggle");
        const uploadSubmit = document.getElementById("upload-submit");
        const clearSelectionButton = document.getElementById("clear-selection");
        const pickFilesButton = document.querySelector("[data-upload-pick='files']");
        const pickFolderButton = document.querySelector("[data-upload-pick='folder']");
        const queueEmptyCta = document.querySelector("[data-queue-empty-cta]");
        const historyEmptyCta = document.querySelector("[data-history-empty-cta]");
        const notifiedJobIds = new Set();
        let notificationsSeeded = false;
        const toastLedger = new Map();
        const previewCache = new Map();
        let guideTimeout = null;

        const PENDING_TOAST_STORAGE_KEY = "mlx-ui:pending-toast";
        const HISTORY_VIEW_STORAGE_KEY = "mlx-ui:history-view";
        const HISTORY_SORT_VALUES = new Set(["newest", "oldest", "name"]);
        const HISTORY_STATUS_VALUES = new Set(["all", "done", "failed"]);

        function prefersReducedMotion() {
          try {
            return (
              typeof window.matchMedia === "function" &&
              window.matchMedia("(prefers-reduced-motion: reduce)").matches
            );
          } catch (error) {
            return false;
          }
        }

        function guideToUpload(options = {}) {
          if (!uploadForm) {
            return;
          }
          const { openPicker = false } = options;
          try {
            uploadForm.scrollIntoView({
              behavior: prefersReducedMotion() ? "auto" : "smooth",
              block: "start"
            });
          } catch (error) {
            uploadForm.scrollIntoView();
          }
          uploadForm.classList.add("is-guided");
          if (dropzone) {
            dropzone.classList.add("is-guided");
            try {
              dropzone.focus({ preventScroll: true });
            } catch (error) {
              dropzone.focus();
            }
          }
          if (guideTimeout) {
            window.clearTimeout(guideTimeout);
          }
          guideTimeout = window.setTimeout(() => {
            uploadForm.classList.remove("is-guided");
            if (dropzone) {
              dropzone.classList.remove("is-guided");
            }
          }, 1600);
          if (openPicker && fileInput) {
            fileInput.click();
          }
        }

        function loadHistoryViewState() {
          const defaults = {
            query: "",
            status: "all",
            sort: "newest",
          };
          try {
            const raw = localStorage.getItem(HISTORY_VIEW_STORAGE_KEY);
            if (!raw) {
              return defaults;
            }
            const parsed = JSON.parse(raw);
            const query = typeof parsed.query === "string" ? parsed.query : defaults.query;
            const status = HISTORY_STATUS_VALUES.has(parsed.status) ? parsed.status : defaults.status;
            const sort = HISTORY_SORT_VALUES.has(parsed.sort) ? parsed.sort : defaults.sort;
            return {
              query,
              status,
              sort,
            };
          } catch (error) {
            return defaults;
          }
        }

        function persistHistoryViewState() {
          if (!historySearch || !historyStatus || !historySort) {
            return;
          }
          const payload = {
            query: historySearch.value || "",
            status: historyStatus.value || "all",
            sort: historySort.value || "newest",
          };
          try {
            localStorage.setItem(HISTORY_VIEW_STORAGE_KEY, JSON.stringify(payload));
          } catch (error) {
            // localStorage may be disabled; UI should still work.
          }
        }

        function parseIsoMs(value) {
          if (!value) {
            return 0;
          }
          const ms = Date.parse(value);
          return Number.isNaN(ms) ? 0 : ms;
        }

        function getHistoryRowMeta(row) {
          const filenameEl = row ? row.querySelector(".history-filename") : null;
          const filename = filenameEl ? filenameEl.textContent.trim() : "";
          const filenameLower = filename.toLowerCase();
          const timeMetaEl = row ? row.querySelector("[data-time-meta]") : null;
          const status = timeMetaEl ? (timeMetaEl.getAttribute("data-status") || "").toLowerCase() : "";
          const createdAt = timeMetaEl ? timeMetaEl.getAttribute("data-created-at") || "" : "";
          const startedAt = timeMetaEl ? timeMetaEl.getAttribute("data-started-at") || "" : "";
          const completedAt = timeMetaEl ? timeMetaEl.getAttribute("data-completed-at") || "" : "";
          const anchorIso = completedAt || startedAt || createdAt;
          return {
            filename,
            filenameLower,
            status,
            anchorMs: parseIsoMs(anchorIso),
          };
        }

        function updateHistorySummary(visibleCount, totalCount, state) {
          if (!historyViewSummary) {
            return;
          }
          if (!totalCount) {
            historyViewSummary.textContent = "";
            historyViewSummary.hidden = true;
            return;
          }
          const query = String(state.query || "").trim();
          const isDefault = !query && state.status === "all" && state.sort === "newest";
          if (isDefault) {
            historyViewSummary.textContent = "";
            historyViewSummary.hidden = true;
            return;
          }
          historyViewSummary.hidden = false;
          if (visibleCount === totalCount) {
            historyViewSummary.textContent = `${totalCount} ${totalCount === 1 ? "item" : "items"}`;
            return;
          }
          historyViewSummary.textContent = `Showing ${visibleCount} of ${totalCount}`;
        }

        function updateHistoryFilteredEmpty(isVisible, state) {
          if (!historyFilterEmpty) {
            return;
          }
          historyFilterEmpty.hidden = !isVisible;
          if (!isVisible) {
            return;
          }
          const body = historyFilterEmpty.querySelector("#history-filter-body");
          if (!body) {
            return;
          }
          const parts = [];
          const query = String(state.query || "").trim();
          if (query) {
            parts.push(`“${query}”`);
          }
          if (state.status && state.status !== "all") {
            parts.push(`status: ${state.status}`);
          }
          const context = parts.length ? ` for ${parts.join(" · ")}` : "";
          body.textContent = `No history items match${context}. Try a different search, or clear filters to see everything again.`;
        }

        function applyHistoryView(options = {}) {
          if (!historyList || !historySearch || !historyStatus || !historySort) {
            return;
          }
          const state = {
            query: historySearch.value || "",
            status: historyStatus.value || "all",
            sort: historySort.value || "newest",
          };
          const query = state.query.trim().toLowerCase();
          const statusFilter = state.status;
          const sortMode = state.sort;

          const rows = Array.from(historyList.querySelectorAll(".history-row"));
          const totalCount = rows.length;
          if (totalCount === 0) {
            historyList.style.display = "grid";
            updateHistoryFilteredEmpty(false, state);
            updateHistorySummary(0, 0, state);
            return;
          }

          const metaRows = rows.map((row) => {
            const meta = getHistoryRowMeta(row);
            return { row, meta };
          });

          metaRows.sort((a, b) => {
            if (sortMode === "name") {
              const aName = a.meta.filenameLower;
              const bName = b.meta.filenameLower;
              const byName = aName.localeCompare(bName, undefined, { sensitivity: "base" });
              if (byName !== 0) {
                return byName;
              }
              return b.meta.anchorMs - a.meta.anchorMs;
            }
            if (sortMode === "oldest") {
              return a.meta.anchorMs - b.meta.anchorMs;
            }
            return b.meta.anchorMs - a.meta.anchorMs;
          });

          const fragment = document.createDocumentFragment();
          let visibleCount = 0;
          metaRows.forEach(({ row, meta }) => {
            const matchesQuery = !query || meta.filenameLower.includes(query);
            const matchesStatus = statusFilter === "all" || meta.status === statusFilter;
            const matches = matchesQuery && matchesStatus;
            row.hidden = !matches;
            if (matches) {
              visibleCount += 1;
            }
            fragment.appendChild(row);
          });
          historyList.appendChild(fragment);

          if (visibleCount === 0) {
            historyList.style.display = "none";
            updateHistoryFilteredEmpty(true, state);
          } else {
            historyList.style.display = "grid";
            updateHistoryFilteredEmpty(false, state);
          }
          updateHistorySummary(visibleCount, totalCount, state);
          if (options.persist !== false) {
            persistHistoryViewState();
          }
        }

        if (queueEmptyCta) {
          queueEmptyCta.addEventListener("click", (event) => {
            event.preventDefault();
            activate("queue", { updateHistory: true });
            guideToUpload({ openPicker: true });
          });
        }

        if (historyEmptyCta) {
          historyEmptyCta.addEventListener("click", (event) => {
            event.preventDefault();
            activate("queue", { updateHistory: true });
            guideToUpload();
          });
        }

        if (historySearch && historyStatus && historySort) {
          const initialView = loadHistoryViewState();
          historySearch.value = initialView.query;
          historyStatus.value = initialView.status;
          historySort.value = initialView.sort;
          applyHistoryView({ persist: false });

          let historySearchTimeout = null;
          historySearch.addEventListener("input", () => {
            window.clearTimeout(historySearchTimeout);
            historySearchTimeout = window.setTimeout(() => {
              applyHistoryView();
            }, 120);
          });
          historyStatus.addEventListener("change", () => applyHistoryView());
          historySort.addEventListener("change", () => applyHistoryView());
        }

        if (historyClearFilters) {
          historyClearFilters.addEventListener("click", () => {
            if (historySearch) {
              historySearch.value = "";
            }
            if (historyStatus) {
              historyStatus.value = "all";
            }
            if (historySort) {
              historySort.value = "newest";
            }
            applyHistoryView();
            if (historySearch) {
              historySearch.focus();
            }
          });
        }

        let workerStartedAt = workerElapsed ? workerElapsed.dataset.startedAt || "" : "";

        function updateWorkerElapsed() {
          if (!workerElapsed) {
            return;
          }
          if (!workerStartedAt) {
            workerElapsed.textContent = "";
            return;
          }
          const elapsed = formatElapsed(workerStartedAt);
          workerElapsed.textContent = elapsed ? `Elapsed ${elapsed}` : "Elapsed …";
        }

        function setWorkerCardState(worker) {
          if (!worker || !workerStatus) {
            return;
          }
          const status = worker.status || "Idle";
          workerStatus.textContent = status;

          const queuedCount =
            typeof worker.queue_length === "number"
              ? worker.queue_length
              : Number.isFinite(Number(worker.queue_length))
                ? Number(worker.queue_length)
                : 0;
          if (workerQueued) {
            workerQueued.textContent = `${queuedCount} queued`;
          }

          const filename = worker.filename || "";
          const isRunning = status === "Running" && Boolean(filename);
          if (workerCurrent) {
            workerCurrent.hidden = !isRunning;
          }
          if (workerFilename) {
            if (isRunning) {
              workerFilename.textContent = filename;
              workerFilename.title = filename;
              workerFilename.setAttribute("aria-label", filename);
            } else {
              workerFilename.textContent = "";
              workerFilename.removeAttribute("title");
              workerFilename.setAttribute("aria-label", "");
            }
          }

          workerStartedAt = isRunning ? worker.started_at || "" : "";
          if (workerElapsed) {
            workerElapsed.dataset.startedAt = workerStartedAt;
            workerElapsed.hidden = !workerStartedAt;
            updateWorkerElapsed();
          }

          const currentJobUi = worker.current_job_ui || null;
          if (workerEngine) {
            const engineSummary = currentJobUi ? currentJobUi.engine_summary || "" : "";
            workerEngine.textContent = engineSummary;
            workerEngine.hidden = !engineSummary;
          }
          if (workerLanguage) {
            const languageLabel =
              currentJobUi && currentJobUi.language ? currentJobUi.language.label || "" : "";
            workerLanguage.textContent = languageLabel ? `Language: ${languageLabel}` : "";
            workerLanguage.hidden = !languageLabel;
          }
        }
        const ICON_CHECK = `
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M9.2 16.6 4.9 12.3l1.4-1.4 2.9 2.9 8.6-8.6 1.4 1.4z"></path>
          </svg>
        `;
        const ICON_ERROR = `
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 2 1 21h22L12 2zm1 15h-2v-2h2v2zm0-4h-2V9h2v4z"></path>
          </svg>
        `;
        const ICON_X = `
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M18.3 5.7 12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"></path>
          </svg>
        `;
        const relativeFormatter =
          typeof Intl !== "undefined" && Intl.RelativeTimeFormat
            ? new Intl.RelativeTimeFormat(undefined, { numeric: "auto", style: "short" })
            : null;
        const MAX_VISIBLE_FILES = 50;
        const ESTIMATE_MB_PER_MIN_FAST = 12;
        const ESTIMATE_MB_PER_MIN_SLOW = 4;
        const ESTIMATE_PER_FILE_MIN = 0.25;
        const MEDIA_EXTENSIONS = new Set([
          "mp3",
          "wav",
          "m4a",
          "flac",
          "ogg",
          "opus",
          "aac",
          "wma",
          "alac",
          "aiff",
          "amr",
          "mp4",
          "mov",
          "mkv",
          "webm",
          "m4v",
          "avi",
          "mpg",
          "mpeg",
          "3gp",
        ]);
        const SKIP_PATH_PARTS = new Set(["__MACOSX"]);

        function escapeHtml(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        const pendingItems = [];
        let skippedCount = 0;
        let showAllFiles = false;
        let scanningFolder = false;
        let scanToken = 0;
        let syncingInput = false;
        let dragDepth = 0;
        let uploadInFlight = false;

        function formatBytes(bytes) {
          if (!Number.isFinite(bytes) || bytes <= 0) {
            return "0 B";
          }
          const units = ["B", "KB", "MB", "GB", "TB"];
          let value = bytes;
          let unitIndex = 0;
          while (value >= 1024 && unitIndex < units.length - 1) {
            value /= 1024;
            unitIndex += 1;
          }
          const precision = value >= 10 || unitIndex === 0 ? 0 : 1;
          return `${value.toFixed(precision)} ${units[unitIndex]}`;
        }

        function normalizeDisplayPath(value) {
          return String(value || "").replace(/\\/g, "/");
        }

        function getExtension(value) {
          const normalized = String(value || "");
          const lastDot = normalized.lastIndexOf(".");
          if (lastDot <= 0 || lastDot === normalized.length - 1) {
            return "";
          }
          return normalized.slice(lastDot + 1).toLowerCase();
        }

        function isHiddenPath(displayPath) {
          const normalized = normalizeDisplayPath(displayPath);
          return normalized.split("/").some((part) => {
            if (!part) {
              return true;
            }
            if (SKIP_PATH_PARTS.has(part)) {
              return true;
            }
            return part.startsWith(".");
          });
        }

        function isAcceptedMedia(file, displayPath) {
          if (isHiddenPath(displayPath)) {
            return false;
          }
          const type = String(file.type || "").toLowerCase();
          if (type.startsWith("audio/") || type.startsWith("video/")) {
            return true;
          }
          const ext = getExtension(displayPath);
          return MEDIA_EXTENSIONS.has(ext);
        }

        function buildItemKey(item) {
          return `${item.displayPath}::${item.file.size}::${item.file.lastModified}`;
        }

        function prepareItems(rawItems) {
          const items = [];
          let skipped = 0;
          rawItems.forEach(({ file, displayPath }) => {
            const normalized =
              normalizeDisplayPath(displayPath) ||
              normalizeDisplayPath(file.webkitRelativePath) ||
              normalizeDisplayPath(file.name);
            if (!normalized || !isAcceptedMedia(file, normalized)) {
              skipped += 1;
              return;
            }
            items.push({ file, displayPath: normalized });
          });
          return { items, skipped };
        }

        function estimateRangeMinutes(totalBytes, count) {
          const totalMb = totalBytes / (1024 * 1024);
          const fast = totalMb / ESTIMATE_MB_PER_MIN_FAST + count * ESTIMATE_PER_FILE_MIN;
          const slow = totalMb / ESTIMATE_MB_PER_MIN_SLOW + count * ESTIMATE_PER_FILE_MIN;
          return { fast, slow };
        }

        function formatBatchLabel(totalBytes, count) {
          if (!count || totalBytes <= 0) {
            return "Small batch";
          }
          const { slow } = estimateRangeMinutes(totalBytes, count);
          if (!Number.isFinite(slow)) {
            return "Medium batch";
          }
          if (slow <= 8) {
            return "Small batch";
          }
          if (slow <= 25) {
            return "Medium batch";
          }
          return "Large batch";
        }

        function syncInputFiles(items) {
          if (!fileInput) {
            return;
          }
          if (typeof DataTransfer === "undefined") {
            return;
          }
          const transfer = new DataTransfer();
          items.forEach((item) => transfer.items.add(item.file));
          syncingInput = true;
          fileInput.files = transfer.files;
          syncingInput = false;
        }

        function renderFileItems() {
          if (!fileList) {
            return;
          }
          fileList.innerHTML = "";
          if (pendingItems.length === 0) {
            if (fileListToggle) {
              fileListToggle.style.display = "none";
            }
            return;
          }
          const visibleCount = showAllFiles
            ? pendingItems.length
            : Math.min(MAX_VISIBLE_FILES, pendingItems.length);
          const fragment = document.createDocumentFragment();
          pendingItems.slice(0, visibleCount).forEach((item, index) => {
            const row = document.createElement("div");
            row.className = "file-item";

            const meta = document.createElement("div");
            meta.className = "file-meta";

            const name = document.createElement("div");
            name.className = "file-name";
            name.textContent = item.displayPath || "Untitled file";

            const size = document.createElement("div");
            size.className = "file-size";
            size.textContent = formatBytes(item.file.size || 0);

            meta.appendChild(name);
            meta.appendChild(size);

            const remove = document.createElement("button");
            remove.className = "file-remove";
            remove.type = "button";
            remove.dataset.removeIndex = String(index);
            remove.setAttribute("aria-label", `Remove ${item.displayPath || "file"}`);
            remove.textContent = "Remove";

            row.appendChild(meta);
            row.appendChild(remove);
            fragment.appendChild(row);
          });
          fileList.appendChild(fragment);
          if (fileListToggle) {
            if (pendingItems.length > MAX_VISIBLE_FILES) {
              fileListToggle.style.display = "inline-flex";
              fileListToggle.textContent = showAllFiles ? "Show first 50" : "Show all";
            } else {
              fileListToggle.style.display = "none";
            }
          }
        }

        function renderFileList() {
          if (
            !fileList ||
            !uploadSubmit ||
            !dropzone ||
            !selectionValid ||
            !selectionSize ||
            !selectionBatch ||
            !selectionSkipped ||
            !selectionState ||
            !clearSelectionButton
          ) {
            return;
          }

          const validCount = pendingItems.length;
          const totalBytes = validCount
            ? pendingItems.reduce((sum, item) => sum + (item.file.size || 0), 0)
            : 0;
          const fileLabel = validCount === 1 ? "file" : "files";

          selectionValid.textContent = `${validCount} ${fileLabel}`;
          selectionSize.textContent = formatBytes(totalBytes);
          selectionBatch.textContent = formatBatchLabel(totalBytes, validCount);

          selectionSkipped.textContent = `Skipped ${skippedCount}`;
          if (skippedCount > 0) {
            selectionSkipped.classList.add("is-skipped");
            selectionSkipped.classList.remove("is-muted");
          } else {
            selectionSkipped.classList.remove("is-skipped");
            selectionSkipped.classList.add("is-muted");
          }

          selectionState.hidden = !scanningFolder;
          if (dropzone) {
            dropzone.classList.toggle("is-scanning", scanningFolder);
            dropzone.setAttribute("aria-busy", scanningFolder ? "true" : "false");
          }
          if (uploadForm) {
            uploadForm.classList.toggle("is-scanning", scanningFolder);
          }
          if (pickFilesButton) {
            pickFilesButton.disabled = scanningFolder;
          }
          if (pickFolderButton) {
            pickFolderButton.disabled = scanningFolder;
          }

          const canClear = scanningFolder || validCount > 0 || skippedCount > 0;
          clearSelectionButton.disabled = !canClear;

          const isReadyToQueue = !scanningFolder && validCount > 0;
          uploadSubmit.disabled = !isReadyToQueue;
          if (scanningFolder) {
            uploadSubmit.textContent = "Please wait…";
          } else if (validCount === 0) {
            uploadSubmit.textContent = "Queue uploads";
          } else {
            uploadSubmit.textContent = `Queue ${validCount} ${fileLabel}`;
          }

          if (validCount === 0) {
            dropzone.classList.remove("has-files");
          } else {
            dropzone.classList.add("has-files");
          }

          renderFileItems();
        }

        function setPendingItems(nextItems, nextSkipped = 0) {
          pendingItems.splice(0, pendingItems.length, ...nextItems);
          skippedCount = nextSkipped;
          showAllFiles = false;
          syncInputFiles(pendingItems);
          renderFileList();
        }

        function clearSelection() {
          scanToken += 1;
          scanningFolder = false;
          dragDepth = 0;
          if (dropzone) {
            dropzone.classList.remove("is-active");
          }
          if (fileInput) {
            fileInput.value = "";
          }
          if (folderInput) {
            folderInput.value = "";
          }
          setPendingItems([], 0);
        }

        function mergeItems(existing, incoming) {
          const merged = [...existing];
          const seen = new Set(existing.map(buildItemKey));
          incoming.forEach((item) => {
            const key = buildItemKey(item);
            if (!seen.has(key)) {
              merged.push(item);
              seen.add(key);
            }
          });
          return merged;
        }

        function readDirectoryEntries(directoryEntry) {
          const reader = directoryEntry.createReader();
          return new Promise((resolve) => {
            const entries = [];
            const readBatch = () => {
              reader.readEntries(
                (batch) => {
                  if (!batch.length) {
                    resolve(entries);
                    return;
                  }
                  entries.push(...batch);
                  readBatch();
                },
                () => resolve(entries)
              );
            };
            readBatch();
          });
        }

        async function traverseEntry(entry, pathPrefix) {
          if (!entry) {
            return [];
          }
          if (entry.isFile) {
            return new Promise((resolve) => {
              entry.file(
                (file) => resolve([{ file, displayPath: `${pathPrefix}${file.name}` }]),
                () => resolve([])
              );
            });
          }
          if (entry.isDirectory) {
            const nextPrefix = `${pathPrefix}${entry.name}/`;
            const children = await readDirectoryEntries(entry);
            const nested = await Promise.all(
              children.map((child) => traverseEntry(child, nextPrefix))
            );
            return nested.flat();
          }
          return [];
        }

        async function collectDroppedItems(dataTransfer) {
          if (!dataTransfer) {
            return { items: [], skipped: 0, usedEntries: false };
          }
          const dataItems = Array.from(dataTransfer.items || []);
          const entries = dataItems
            .map((item) =>
              typeof item.webkitGetAsEntry === "function" ? item.webkitGetAsEntry() : null
            )
            .filter(Boolean);
          if (entries.length > 0) {
            const collected = await Promise.all(entries.map((entry) => traverseEntry(entry, "")));
            const rawItems = collected.flat();
            const prepared = prepareItems(rawItems);
            return { ...prepared, usedEntries: true };
          }
          const files = Array.from(dataTransfer.files || []);
          const rawItems = files.map((file) => ({ file, displayPath: file.name }));
          const prepared = prepareItems(rawItems);
          return { ...prepared, usedEntries: false };
        }

        function isFileDrag(event) {
          if (!event.dataTransfer) {
            return false;
          }
          const types = Array.from(event.dataTransfer.types || []);
          if (types.includes("Files") || types.includes("public.file-url")) {
            return true;
          }
          if (event.dataTransfer.files && event.dataTransfer.files.length > 0) {
            return true;
          }
          if (event.dataTransfer.items && event.dataTransfer.items.length > 0) {
            return true;
          }
          return false;
        }

        function formatRelative(date) {
          if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
            return "";
          }
          const diffMs = date.getTime() - Date.now();
          const absMs = Math.abs(diffMs);
          if (absMs < 45000) {
            return "just now";
          }
          const units = [
            ["year", 31536000000],
            ["month", 2592000000],
            ["day", 86400000],
            ["hour", 3600000],
            ["minute", 60000],
          ];
          for (const [unit, unitMs] of units) {
            if (absMs >= unitMs) {
              const value = Math.round(diffMs / unitMs);
              if (relativeFormatter) {
                return relativeFormatter.format(value, unit);
              }
              const rounded = Math.abs(value);
              return `${rounded} ${unit}${rounded === 1 ? "" : "s"} ${
                value < 0 ? "ago" : "from now"
              }`;
            }
          }
          const seconds = Math.round(diffMs / 1000);
          if (relativeFormatter) {
            return relativeFormatter.format(seconds, "second");
          }
          const absSeconds = Math.abs(seconds);
          return `${absSeconds} sec ${seconds < 0 ? "ago" : "from now"}`;
        }

        function formatTimestamp(isoString) {
          if (!isoString) {
            return { absolute: "", relative: "" };
          }
          const date = new Date(isoString);
          if (Number.isNaN(date.getTime())) {
            return { absolute: isoString, relative: "" };
          }
          let absolute = "";
          try {
            absolute = date.toLocaleString([], {
              year: "numeric",
              month: "short",
              day: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });
          } catch (error) {
            absolute = date.toLocaleString();
          }
          return { absolute, relative: formatRelative(date) };
        }

        function formatDuration(ms) {
          const totalSeconds = Math.max(0, Math.floor(ms / 1000));
          const hours = Math.floor(totalSeconds / 3600);
          const minutes = Math.floor((totalSeconds % 3600) / 60);
          const seconds = totalSeconds % 60;
          const paddedMinutes = String(minutes).padStart(2, "0");
          const paddedSeconds = String(seconds).padStart(2, "0");
          if (hours > 0) {
            return `${String(hours).padStart(2, "0")}:${paddedMinutes}:${paddedSeconds}`;
          }
          return `${paddedMinutes}:${paddedSeconds}`;
        }

        function formatElapsed(isoString) {
          if (!isoString) {
            return "";
          }
          const startedAt = new Date(isoString);
          if (Number.isNaN(startedAt.getTime())) {
            return "";
          }
          return formatDuration(Date.now() - startedAt.getTime());
        }

        function calculateDuration(startIso, endIso) {
          if (!startIso || !endIso) {
            return "";
          }
          const start = new Date(startIso);
          const end = new Date(endIso);
          if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) {
            return "";
          }
          const diff = Math.max(0, end.getTime() - start.getTime());
          if (!diff) {
            return "";
          }
          return formatDuration(diff);
        }

        function formatTimeMeta(status, createdAt, startedAt, completedAt) {
          const normalized = String(status || "").toLowerCase();
          let label = "Updated";
          if (normalized === "done") {
            label = "Completed";
          } else if (normalized === "failed") {
            label = "Failed";
          } else if (normalized === "running") {
            label = "Running";
          } else if (normalized === "queued") {
            label = "Queued";
          }
          const anchorIso =
            normalized === "done" || normalized === "failed"
              ? completedAt || startedAt || createdAt
              : normalized === "running"
                ? startedAt || createdAt
                : createdAt || startedAt || completedAt;
          const { absolute, relative } = formatTimestamp(anchorIso);
          const timeText = relative || absolute;
          if (!timeText) {
            return { text: "", title: "" };
          }
          let text = `${label} ${timeText}`;
          if ((normalized === "done" || normalized === "failed") && completedAt) {
            const duration = calculateDuration(startedAt || createdAt, completedAt);
            if (duration) {
              text += ` · ${duration}`;
            }
          }
          return { text, title: absolute };
        }

        function hydrateTimeMeta(root) {
          const scope = root || document;
          scope.querySelectorAll("[data-time-meta]").forEach((element) => {
            const status = element.getAttribute("data-status") || "";
            const createdAt = element.getAttribute("data-created-at") || "";
            const startedAt = element.getAttribute("data-started-at") || "";
            const completedAt = element.getAttribute("data-completed-at") || "";
            const meta = formatTimeMeta(status, createdAt, startedAt, completedAt);
            if (!meta.text) {
              return;
            }
            element.textContent = meta.text;
            if (meta.title) {
              element.setAttribute("title", meta.title);
            }
          });
        }

        function hydrateTimestamps(root) {
          const scope = root || document;
          scope.querySelectorAll("[data-iso][data-label]").forEach((element) => {
            const isoString = element.getAttribute("data-iso");
            const label = element.getAttribute("data-label") || "";
            const { absolute, relative } = formatTimestamp(isoString);
            if (!absolute) {
              return;
            }
            const relativeText = relative ? ` · ${relative}` : "";
            element.textContent = `${label} ${absolute}${relativeText}`;
          });
        }

        function hydrateElapsed(root) {
          const scope = root || document;
          scope.querySelectorAll("[data-started-at]").forEach((element) => {
            const isoString = element.getAttribute("data-started-at");
            if (!isoString) {
              element.textContent = "";
              return;
            }
            const elapsed = formatElapsed(isoString);
            element.textContent = elapsed ? `Elapsed ${elapsed}` : "Elapsed …";
          });
        }

        function updateQueueCount(count) {
          const label = count === 1 ? "file" : "files";
          queueCountEls.forEach((element) => {
            element.textContent = `${count} ${label} queued`;
          });
        }

        function updateHistoryClearState(count) {
          if (!historyClearButton) {
            return;
          }
          historyClearButton.disabled = !count;
        }

        function updateSettingsStorageState(queue, history) {
          const historyButton = document.querySelector("[data-storage-action='clear-history']");
          if (historyButton instanceof HTMLButtonElement) {
            const count = Array.isArray(history) ? history.length : 0;
            historyButton.disabled = !count;
            historyButton.setAttribute("data-item-count", String(count));
            historyButton.textContent = `Delete completed history (${count})`;
          }

          const uploadsButton = document.querySelector("[data-storage-action='clear-uploads']");
          if (uploadsButton instanceof HTMLButtonElement) {
            const count = Array.isArray(queue) ? queue.length : 0;
            uploadsButton.disabled = count > 0;
            uploadsButton.setAttribute("data-item-count", String(count));
          }
        }

        function getHistoryRowSummary(row) {
          const filenameEl = row ? row.querySelector(".history-filename") : null;
          const filename = filenameEl ? filenameEl.textContent.trim() : "Untitled file";
          const timeEl = row ? row.querySelector("[data-time-meta]") : null;
          const createdAt = timeEl ? timeEl.getAttribute("data-created-at") || "" : "";
          const startedAt = timeEl ? timeEl.getAttribute("data-started-at") || "" : "";
          const completedAt = timeEl ? timeEl.getAttribute("data-completed-at") || "" : "";
          const anchorIso = completedAt || startedAt || createdAt;
          const { absolute } = formatTimestamp(anchorIso);
          const duration = calculateDuration(startedAt || createdAt, completedAt);
          const chips = row ? Array.from(row.querySelectorAll(".output-chip")) : [];
          const outputs = chips
            .map((chip) => chip.textContent.trim())
            .filter((text) => Boolean(text));
          return {
            filename,
            absoluteTime: absolute,
            duration,
            outputs,
          };
        }

        function buildHistoryDeleteMessage(summary) {
          const timeParts = [];
          if (summary.absoluteTime) {
            timeParts.push(summary.absoluteTime);
          }
          if (summary.duration) {
            timeParts.push(summary.duration);
          }
          const timeText = timeParts.length ? ` (${timeParts.join(" · ")})` : "";
          const lines = [
            `Delete "${summary.filename}"${timeText}?`,
            "This removes the job from History and deletes its stored outputs (transcripts/logs) from disk.",
          ];
          if (summary.outputs.length) {
            lines.push(`Outputs: ${summary.outputs.join(", ")}`);
          }
          lines.push("Downloaded files, clipboard contents, and Telegram copies aren't removed.");
          return lines.join("\n");
        }

        function buildHistoryClearMessage(count) {
          const label = count === 1 ? "item" : "items";
          return [
            "Delete all results?",
            `This will delete ${count} completed ${label} and remove their stored outputs (transcripts/logs) from disk.`,
            "This can't be undone.",
            "Downloaded files, clipboard contents, and Telegram copies aren't removed.",
          ].join("\n");
        }

        if (
          uploadForm &&
          fileInput &&
          dropzone &&
          fileList &&
          selectionValid &&
          selectionSize &&
          selectionBatch &&
          selectionSkipped &&
          selectionState &&
          uploadSubmit &&
          clearSelectionButton
        ) {
          renderFileList();

          if (pickFilesButton) {
            pickFilesButton.addEventListener("click", () => fileInput.click());
          }

          if (pickFolderButton && folderInput) {
            pickFolderButton.addEventListener("click", () => folderInput.click());
          }

          clearSelectionButton.addEventListener("click", () => {
            clearSelection();
          });

          fileInput.addEventListener("change", () => {
            if (syncingInput) {
              return;
            }
            scanToken += 1;
            scanningFolder = false;
            const rawItems = Array.from(fileInput.files || []).map((file) => ({
              file,
              displayPath: file.webkitRelativePath || file.name,
            }));
            const prepared = prepareItems(rawItems);
            setPendingItems(prepared.items, prepared.skipped);
          });

          if (folderInput) {
            folderInput.addEventListener("change", () => {
              scanToken += 1;
              scanningFolder = false;
              const rawItems = Array.from(folderInput.files || []).map((file) => ({
                file,
                displayPath: file.webkitRelativePath || file.name,
              }));
              const prepared = prepareItems(rawItems);
              setPendingItems(prepared.items, prepared.skipped);
            });
          }

          if (fileListToggle) {
            fileListToggle.addEventListener("click", () => {
              showAllFiles = !showAllFiles;
              renderFileList();
            });
          }

          dropzone.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              fileInput.click();
            }
          });

          dropzone.addEventListener("dragenter", (event) => {
            if (!isFileDrag(event)) {
              return;
            }
            event.preventDefault();
            dragDepth += 1;
            dropzone.classList.add("is-active");
          });

          dropzone.addEventListener("dragover", (event) => {
            if (!isFileDrag(event)) {
              return;
            }
            event.preventDefault();
          });

          dropzone.addEventListener("dragleave", (event) => {
            if (!isFileDrag(event)) {
              return;
            }
            dragDepth = Math.max(0, dragDepth - 1);
            if (dragDepth === 0) {
              dropzone.classList.remove("is-active");
            }
          });

          dropzone.addEventListener("drop", async (event) => {
            if (!isFileDrag(event)) {
              return;
            }
            event.preventDefault();
            dragDepth = 0;
            dropzone.classList.remove("is-active");
            if (!event.dataTransfer) {
              return;
            }
            const dropToken = (scanToken += 1);
            const shouldScan = Array.from(event.dataTransfer.items || []).some((item) => {
              if (typeof item.webkitGetAsEntry !== "function") {
                return false;
              }
              const entry = item.webkitGetAsEntry();
              return entry && entry.isDirectory;
            });
            scanningFolder = shouldScan;
            if (shouldScan) {
              renderFileList();
            }
            let prepared;
            try {
              prepared = await collectDroppedItems(event.dataTransfer);
            } finally {
              if (dropToken === scanToken) {
                scanningFolder = false;
              }
            }
            if (dropToken !== scanToken) {
              renderFileList();
              return;
            }
            if (!prepared) {
              renderFileList();
              return;
            }
            const nextSkipped = skippedCount + prepared.skipped;
            if (prepared.items.length === 0) {
              skippedCount = nextSkipped;
              renderFileList();
              return;
            }
            const merged = mergeItems(pendingItems, prepared.items);
            setPendingItems(merged, nextSkipped);
          });

          fileList.addEventListener("click", (event) => {
            const target = event.target.closest("[data-remove-index]");
            if (!target) {
              return;
            }
            const index = Number(target.dataset.removeIndex);
            if (Number.isNaN(index)) {
              return;
            }
            const nextItems = pendingItems.slice();
            nextItems.splice(index, 1);
            setPendingItems(nextItems, skippedCount);
          });

          uploadForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            if (uploadInFlight || scanningFolder || pendingItems.length === 0) {
              return;
            }
            uploadInFlight = true;
            uploadSubmit.disabled = true;
            uploadSubmit.textContent = "Queuing…";
            try {
              const formData = new FormData();
              pendingItems.forEach((item) => {
                formData.append("files", item.file, item.displayPath || item.file.name);
              });
              const response = await fetch("/upload", {
                method: "POST",
                body: formData,
              });
              if (response.ok) {
                const count = pendingItems.length;
                const label = count === 1 ? "file" : "files";
                storePendingToast({
                  title: "Queue",
                  message: `Queued ${count} ${label}.`,
                  kind: "success",
                  key: "queue:queued",
                  cooldown: 0,
                  duration: 5200,
                });
                window.location = "/?tab=queue";
                return;
              }
              const message = await response.text();
              console.error("Upload failed", response.status, message);
              notifySystem("Queue", "Couldn’t queue uploads. Try again.", "error", {
                key: "queue:queued:error",
                cooldown: 1500,
              });
            } catch (error) {
              console.error("Upload failed", error);
              notifySystem("Queue", "Couldn’t queue uploads. Try again.", "error", {
                key: "queue:queued:error",
                cooldown: 1500,
              });
            } finally {
              uploadInFlight = false;
              renderFileList();
            }
          });
        }

        function pickDefaultResult(results) {
          if (!results || results.length === 0) {
            return "";
          }
          const preferred = results.find((result) => result.toLowerCase().endsWith(".txt"));
          return preferred || results[0];
        }

        function summarizeError(message, limit = 160) {
          if (!message) {
            return "";
          }
          const firstLine = String(message).split(/\r?\n/)[0].trim();
          if (!firstLine) {
            return "";
          }
          const condensed = firstLine.replace(/\s+/g, " ");
          if (condensed.length <= limit) {
            return condensed;
          }
          return `${condensed.slice(0, Math.max(limit - 1, 0))}…`;
        }

        function buildOutputChips(jobId, results) {
          if (!results || results.length === 0) {
            return "";
          }
          const seen = new Set();
          const chips = [];
          results.forEach((result) => {
            const parts = String(result).split(".");
            const ext = parts.length > 1 ? parts[parts.length - 1] : "file";
            const label = ext.toUpperCase();
            if (seen.has(label)) {
              return;
            }
            seen.add(label);
            chips.push(
              `<span class="output-chip">${escapeHtml(label)}</span>`
            );
          });
          if (chips.length === 0) {
            return "";
          }
          return `<div class="output-chips">${chips.join("")}</div>`;
        }

        function buildOutputList(jobId, results) {
          if (!results || results.length === 0) {
            return "";
          }
          const encodedJobId = encodeURIComponent(jobId);
          const items = results
            .map((result) => {
              const encodedResult = encodeURIComponent(result);
              const safeResult = escapeHtml(result);
              return `
                <li class="detail-result-item">
                  <a
                    class="detail-result-link"
                    href="/results/${encodedJobId}/${encodedResult}"
                    target="_blank"
                    rel="noopener"
                  >
                    ${safeResult}
                  </a>
                </li>
              `;
            })
            .join("");
          return `
            <div class="detail-block">
              <div class="detail-label">Outputs</div>
              <ul class="detail-results">${items}</ul>
            </div>
          `;
        }

        function buildMetaLine(label, isoString, className) {
          if (!isoString) {
            return "";
          }
          const classLabel = className || "job-meta";
          return `
            <div class="${classLabel}" data-iso="${escapeHtml(isoString)}" data-label="${escapeHtml(
              label
            )}"></div>
          `;
        }

        function buildMetaLines(job) {
          const lines = [buildMetaLine("Added", job.created_at, "job-meta")];
          if (job.started_at) {
            lines.push(buildMetaLine("Started", job.started_at, "job-meta"));
          }
          if (job.completed_at) {
            lines.push(buildMetaLine("Completed", job.completed_at, "job-meta"));
          }
          return lines.join("");
        }

        function buildJobMetaChips(job) {
          const ui = job && job.ui && typeof job.ui === "object" ? job.ui : null;
          if (!ui) {
            return "";
          }
          const chips = [];
          const engineBadges = Array.isArray(ui.engine_badges) ? ui.engine_badges : [];
          if (engineBadges.length > 0) {
            const engineMarkup = engineBadges
              .map((badge) => {
                const kind = escapeHtml(badge.kind || "engine");
                const mode = escapeHtml(badge.mode || "unknown");
                const title = escapeHtml(badge.title || badge.label || "");
                const label = escapeHtml(badge.label || "");
                return `
                  <span class="meta-chip is-${kind} is-${mode}" title="${title}">
                    ${label}
                  </span>
                `;
              })
              .join("");
            chips.push(`<span class="meta-chips" aria-label="Engine">${engineMarkup}</span>`);
          }
          const language = ui.language && typeof ui.language === "object" ? ui.language : null;
          if (language && language.short_label) {
            chips.push(`
              <span
                class="meta-chip is-language"
                title="Language: ${escapeHtml(language.label || language.short_label)}"
              >
                ${escapeHtml(language.short_label)}
              </span>
            `);
          }
          return chips.join("");
        }

        function buildPreviewMetaText(job) {
          const ui = job && job.ui && typeof job.ui === "object" ? job.ui : null;
          return ui && ui.preview_meta ? String(ui.preview_meta) : "";
        }

        function buildQueueActions(job) {
          const canDelete = job.status === "queued";
          if (!canDelete) {
            return '<div class="job-actions"></div>';
          }
          return `
            <div class="job-actions">
              <button
                class="job-bin"
                type="button"
                data-job-id="${escapeHtml(job.id)}"
                aria-label="Remove from queue"
                title="Remove from queue"
              >
                <svg class="job-bin-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M9 3h6l1 2h5v2H3V5h5l1-2zm-2 6h2v9H7V9zm4 0h2v9h-2V9zm4 0h2v9h-2V9z"></path>

        function buildQueueLine(position) {
          if (!position) {

          const itemsAhead = Math.max(position - 1, 0);
          const label = itemsAhead === 1 ? "item" : "items";
          return `
            <span class="job-chip is-strong">Queue #${position}</span>
            <span class="job-chip">${itemsAhead} ${label} ahead</span>

          const statusClass =
            statusRaw === "running" ? "is-running" : statusRaw === "queued" ? "is-queued" : "";
          const badgeClass = statusClass ? `status-badge ${statusClass}` : "status-badge";
          const safeFilename = escapeHtml(job.filename || "Untitled file");
          const icon = isRunning ? '<div class="job-icon" aria-hidden="true">⏳</div>' : "";
          const metaLines = buildMetaLines(job);

          const metaChips = buildJobMetaChips(job);

        function buildHistoryMenu(job, results, defaultResult, isOpen) {

        function buildHistoryDetails(job, results, defaultResult, isOpen) {

        function buildHistoryRow(job, resultsByJob, openJobs, openMenus) {

        function normalizeToastKey(value) {
          return String(value || "")
            .trim()
            .replace(/[^a-z0-9:_-]+/gi, "-")
            .replace(/^-+|-+$/g, "")
            .slice(0, 80);
        }

        function buildToast(job, resultsByJob, opts) {
          if (!toastStack) {
            return;
          }
          const options = opts || {};
          const isFailed = job.status === "failed";
          const duration = options.duration || (isFailed ? 12000 : 8000);

          const toastKey = options.key ? normalizeToastKey(options.key) : "";
          const cooldown =
            typeof options.cooldown === "number" ? Math.max(0, options.cooldown) : 1500;
          if (toastKey) {
            const now = Date.now();
            const lastShown = toastLedger.get(toastKey);
            if (typeof lastShown === "number" && now - lastShown < cooldown) {
              return;
            }
            toastLedger.set(toastKey, now);
            const existing = toastStack.querySelector(`.toast[data-toast-key="${toastKey}"]`);
            if (existing) {
              existing.remove();
            }
          }

          const toast = document.createElement("div");
          toast.className = `toast ${isFailed ? "is-failed" : "is-done"}`;
          toast.style.setProperty("--toast-duration", `${duration}ms`);
          if (toastKey) {
            toast.dataset.toastKey = toastKey;
          }
          toast.setAttribute("role", isFailed ? "alert" : "status");
          toast.setAttribute("aria-atomic", "true");
          if (options.clickable) {
            toast.classList.add("is-clickable");
            toast.setAttribute("tabindex", "0");
          }

          const icon = document.createElement("div");
          icon.className = "toast__icon";
          icon.innerHTML = isFailed ? ICON_ERROR : ICON_CHECK;

          const header = document.createElement("div");
          header.className = "toast__header";

          const title = document.createElement("div");
          title.className = "toast__title";
          title.textContent =
            options.title ||
            (isFailed ? "Transcription failed" : "Transcription complete");

          const meta = document.createElement("div");
          meta.className = "toast__meta";
          if (job.completed_at && options.showTime !== false) {
            try {
              meta.textContent = new Date(job.completed_at).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              });
            } catch (error) {
              meta.textContent = "";
            }
          }

          header.appendChild(title);
          if (meta.textContent) {
            header.appendChild(meta);
          }

          const body = document.createElement("div");
          body.className = "toast__body";
          const bodyText = options.body || job.filename || "Unknown file";
          body.textContent = bodyText;
          body.title = bodyText;

          const dismiss = document.createElement("button");
          dismiss.className = "toast__dismiss";
          dismiss.type = "button";
          dismiss.setAttribute("aria-label", "Dismiss notification");
          dismiss.innerHTML = ICON_X;

          const progress = document.createElement("div");
          progress.className = "toast__progress";
          const bar = document.createElement("div");
          bar.className = "toast__progressBar";
          progress.appendChild(bar);

          const toastLimit = 4;
          while (toastStack.children.length >= toastLimit) {
            toastStack.removeChild(toastStack.firstElementChild);
          }

          toast.appendChild(icon);
          toast.appendChild(header);
          toast.appendChild(dismiss);
          toast.appendChild(body);
          toast.appendChild(progress);
          toastStack.appendChild(toast);
          requestAnimationFrame(() => {
            toast.classList.add("is-visible");
          });

          let timeoutId = null;
          let remaining = duration;
          let startedAt = performance.now();

          function cleanup() {
            window.removeEventListener("keydown", onKeyDown);
          }

          function dismissToast() {
            window.clearTimeout(timeoutId);
            timeoutId = null;
            toast.classList.remove("is-visible");
            cleanup();
            window.setTimeout(() => toast.remove(), 200);
          }

          function schedule(ms) {
            window.clearTimeout(timeoutId);
            startedAt = performance.now();
            timeoutId = window.setTimeout(dismissToast, ms);
          }

          function pause() {
            if (!timeoutId) {
              return;
            }
            const elapsed = performance.now() - startedAt;
            remaining = Math.max(0, remaining - elapsed);
            window.clearTimeout(timeoutId);
            timeoutId = null;
            toast.classList.add("is-paused");
          }

          function resume() {
            if (timeoutId) {
              return;
            }
            toast.classList.remove("is-paused");
            if (remaining <= 0) {
              dismissToast();
              return;
            }
            schedule(remaining);
          }

          function onKeyDown(event) {
            if (event.key === "Escape") {
              if (toastStack && toastStack.lastElementChild === toast) {
                dismissToast();
              }
            }
          }

          dismiss.addEventListener("click", (event) => {
            event.stopPropagation();
            dismissToast();
          });
          toast.addEventListener("mouseenter", pause);
          toast.addEventListener("mouseleave", resume);
          toast.addEventListener("focusin", pause);
          toast.addEventListener("focusout", resume);
          window.addEventListener("keydown", onKeyDown);

          toast.addEventListener("click", () => {
            if (!options.clickable) {
              return;
            }
            window.location.href = options.link || "/?tab=history";
          });

          toast.addEventListener("keydown", (event) => {
            if (!options.clickable) {
              return;
            }
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              window.location.href = options.link || "/?tab=history";
            }
          });

          schedule(remaining);
        }

        function handleNotifications(history, resultsByJob) {
          const completed = (history || []).filter(
            (job) => job.status === "done" || job.status === "failed"
          );
          if (!notificationsSeeded) {
            completed.forEach((job) => notifiedJobIds.add(job.id));
            notificationsSeeded = true;
            return;
          }
          completed.forEach((job) => {
            if (!notifiedJobIds.has(job.id)) {
              notifiedJobIds.add(job.id);
              buildToast(job, resultsByJob, { clickable: true, key: `job:${job.id}:${job.status}` });
            }
          });
        }

        function showToast(payload) {
          const toastPayload = payload || {};
          const kind = toastPayload.kind === "error" ? "error" : "success";
          const isError = kind === "error";
          const messageText = toastPayload.message ? String(toastPayload.message) : "";
          const titleText = toastPayload.title
            ? String(toastPayload.title)
            : isError
              ? "Error"
              : "Done";
          const duration =
            typeof toastPayload.duration === "number"
              ? toastPayload.duration
              : isError
                ? 10000
                : 6000;
          const key = toastPayload.key || "";
          const cooldown =
            typeof toastPayload.cooldown === "number" ? toastPayload.cooldown : 1500;
          const link = toastPayload.link || "";
          const clickable = Boolean(toastPayload.clickable);

          buildToast(
            {
              id: `system-${Date.now()}`,
              status: isError ? "failed" : "done",
              filename: messageText,
              completed_at: new Date().toISOString(),
            },
            {},
            {
              title: titleText,
              body: messageText,
              duration,
              showTime: false,
              clickable,
              link,
              key,
              cooldown,
            }
          );
        }

        function notifySystem(titleText, bodyText, kind, options) {
          const opts = options || {};
          showToast({
            title: titleText,
            message: bodyText,
            kind: kind === "error" ? "error" : "success",
            duration: opts.duration,
            key: opts.key,
            cooldown: opts.cooldown,
            clickable: opts.clickable,
            link: opts.link,
          });
        }

        function storePendingToast(payload) {
          if (!payload) {
            return;
          }
          try {
            localStorage.setItem(PENDING_TOAST_STORAGE_KEY, JSON.stringify(payload));
          } catch (error) {
            // localStorage may be disabled; ignore.
          }
        }

        function consumePendingToast() {
          try {
            const raw = localStorage.getItem(PENDING_TOAST_STORAGE_KEY);
            if (!raw) {
              return;
            }
            localStorage.removeItem(PENDING_TOAST_STORAGE_KEY);
            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== "object") {
              return;
            }
            if (parsed.title && parsed.message) {
              showToast(parsed);
            }
          } catch (error) {
            // Ignore parsing/storage errors.
          }
        }

        consumePendingToast();
        if (settingsBannerSuccess && !settingsBannerSuccess.hidden) {
          notifySystem("Settings", "Saved.", "success", {
            key: "settings:saved",
            cooldown: 0,
            duration: 4200,
          });
        }

        async function copyToClipboard(text) {
          if (!text) {
            return false;
          }
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(text);
              return true;
            }
          } catch (error) {
            // Fall back to execCommand below.
          }
          try {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "absolute";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.select();
            const success = document.execCommand("copy");
            document.body.removeChild(textarea);
            return success;
          } catch (error) {
            return false;
          }
        }

        function previewCacheKey(jobId, url) {
          const key = url || jobId || "";
          return String(key);
        }

        async function fetchPreviewSnippet(jobId, url) {
          const key = previewCacheKey(jobId, url);
          if (key && previewCache.has(key)) {
            return previewCache.get(key);
          }
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) {
            throw new Error("Failed to load preview.");
          }
          const payload = await response.json();
          const data = {
            snippet: payload.snippet || "",
            truncated: Boolean(payload.truncated),
            filename: payload.filename || "",
          };
          if (key) {
            previewCache.set(key, data);
          }
          return data;
        }

        function updatePreviewBlock(block, payload) {
          if (!block) {
            return;
          }
          const snippetEl = block.querySelector("[data-preview-snippet]");
          if (!snippetEl) {
            return;
          }
          let text = payload.snippet || "";
          if (!text) {
            text = "No preview available.";
          } else if (payload.truncated) {
            text = `${text}…`;
          }
          snippetEl.textContent = text;
          snippetEl.classList.remove("is-loading");
          block.dataset.previewState = "loaded";
        }

        async function loadPreviewBlock(block) {
          if (!block || block.dataset.previewState === "loading" || block.dataset.previewState === "loaded") {
            return;
          }
          const row = block.closest(".history-row");
          const jobId = row ? row.getAttribute("data-job-id") : "";
          const url = block.getAttribute("data-preview-url") || "";
          if (!jobId || !url) {
            return;
          }
          block.dataset.previewState = "loading";
          const snippetEl = block.querySelector("[data-preview-snippet]");
          if (snippetEl) {
            snippetEl.textContent = "Loading preview…";
            snippetEl.classList.add("is-loading");
          }
          try {
            const payload = await fetchPreviewSnippet(jobId, url);
            updatePreviewBlock(block, payload);
          } catch (error) {
            console.warn("Failed to load preview", error);
            if (snippetEl) {
              snippetEl.textContent = "Preview unavailable.";
              snippetEl.classList.remove("is-loading");
            }
            block.dataset.previewState = "";
          }
        }

        async function copyPreviewForJob(jobId, row) {
          const block = row ? row.querySelector("[data-preview-block]") : null;
          if (!block) {
            notifySystem("Preview", "No preview available.", "error", {
              key: "preview:unavailable",
              cooldown: 2500,
            });
            return;
          }
          const url = block.getAttribute("data-preview-url") || "";
          if (!url) {
            notifySystem("Preview", "No preview available.", "error", {
              key: "preview:unavailable",
              cooldown: 2500,
            });
            return;
          }
          try {
            const payload = await fetchPreviewSnippet(jobId, url);
            updatePreviewBlock(block, payload);
            const text = payload.snippet
              ? payload.truncated
                ? `${payload.snippet}…`
                : payload.snippet
              : "";
            if (!text) {
              notifySystem("Preview", "No preview available.", "error", {
                key: "preview:unavailable",
                cooldown: 2500,
              });
              return;
            }
            const success = await copyToClipboard(text);
            if (success) {
              notifySystem("Clipboard", "Preview copied.", "success", {
                key: "clipboard:preview",
                cooldown: 1200,
                duration: 4500,
              });
            } else {
              throw new Error("Copy failed");
            }
          } catch (error) {
            console.warn("Failed to copy preview", error);
            notifySystem("Clipboard", "Couldn’t copy preview. Try again.", "error", {
              key: "clipboard:preview:error",
              cooldown: 1500,
            });
          }
        }

        const PREVIEW_MODAL_CHARS = 1200;
        let previewModalToken = 0;
        let previewModalReturnFocus = null;
        let previewModalCurrentText = "";

        function isPreviewModalOpen() {
          return Boolean(previewModal && !previewModal.hidden);
        }

        function getPreviewPanel() {
          return previewModal ? previewModal.querySelector(".modal__panel") : null;
        }

        function getPreviewFocusable(container) {
          if (!container) {
            return [];
          }
          const selectors = [
            "button:not([disabled])",
            "a[href]",
            "input:not([disabled])",
            "select:not([disabled])",
            "textarea:not([disabled])",
            "[tabindex]:not([tabindex='-1'])",
          ];
          return Array.from(container.querySelectorAll(selectors.join(","))).filter((element) => {
            if (!(element instanceof HTMLElement)) {
              return false;
            }
            if (element.hasAttribute("hidden")) {
              return false;
            }
            return element.getClientRects().length > 0;
          });
        }

        function trapPreviewFocus(event) {
          const panel = getPreviewPanel();
          const focusable = getPreviewFocusable(panel);
          if (!focusable.length) {
            return;
          }
          const first = focusable[0];
          const last = focusable[focusable.length - 1];

            urlFromEl || `/api/jobs/${encodeURIComponent(jobId)}/preview?chars=${PREVIEW_MODAL_CHARS}`;

          const fallbackFilename = actionEl.getAttribute("data-default-filename") || "";
          const previewMetaText =
            actionEl.getAttribute("data-preview-meta") ||

            const sourceLabel = resultFilename ? `Output: ${resultFilename}` : "Output: unavailable";

            if (previewModalCopy) {
              previewModalCopy.disabled = false;

        let historyMenuPlacementFrame = 0;

        function resetHistoryMenuPlacement(menu) {
          if (!(menu instanceof HTMLElement)) {
            return;
          }
          menu.classList.remove("is-drop-up", "is-align-left");
          const panel = menu.querySelector(".job-menu-panel");
          if (!(panel instanceof HTMLElement)) {
            return;
          }
          panel.style.removeProperty("--menu-shift-x");
          panel.style.removeProperty("--menu-max-height");
